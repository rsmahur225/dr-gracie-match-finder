<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>dr. Gracie — Let's find your routine</title>

  <!-- Tailwind via CDN (JIT enabled) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Figtree — one warm, rounded sans across the whole UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ============================================================
       DESIGN TOKENS — soft, warm, wellness-friendly
       Sage-olive primary on warm cream. Each Match has its own
       softened tint (butter, dusty blue, peach).
    ============================================================ */
    :root {
      /* Surfaces */
      --cream:       #FAF5EC;
      --cream-deep:  #F2EAD7;
      --paper:       #FFFCF5;
      --border:      #EDE4D2;
      --border-soft: #F4ECDA;

      /* Ink */
      --ink:         #3A352D;
      --ink-soft:    #8A847B;

      /* Primary accent */
      --sage:        #7A8B6C;
      --sage-hover:  #677856;
      --sage-tint:   #E9EDDF;

      /* Match accents */
      --butter:      #F5D99A;
      --butter-deep: #A07B30;
      --sky:         #AEC5D4;
      --sky-deep:    #4F6E83;
      --peach:       #F0C4B4;
      --peach-deep:  #9B5B48;
    }

    /* ============================================================
       BASE
    ============================================================ */
    * { -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--cream); }
    body {
      font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* ============================================================
       SCREEN TRANSITIONS — fade + slide
       Each .screen has three states:
         (none)    → hidden, translated down (pre-enter)
         .active   → visible, translated to 0
         .leaving  → fading out, translated up (post-exit)
       JS orchestrates the transitions and the display swap.
    ============================================================ */
    .screen {
      display: none;
      opacity: 0;
      transform: translateY(24px);
      transition:
        opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .screen.active {
      opacity: 1;
      transform: translateY(0);
    }
    .screen.leaving {
      opacity: 0;
      transform: translateY(-16px);
    }

    /* Question card also uses fade + slide, shorter distance */
    .question-card {
      opacity: 0;
      transform: translateY(16px);
      transition:
        opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .question-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .question-card.leaving {
      opacity: 0;
      transform: translateY(-10px);
    }

    /* ============================================================
       OPTION CARDS — bigger, softer, friendlier
    ============================================================ */
    .option-btn {
      border: 1.5px solid var(--border);
      background: var(--paper);
      transition:
        border-color 0.2s ease,
        background 0.2s ease,
        transform 0.15s ease,
        box-shadow 0.2s ease;
    }
    .option-btn:hover {
      border-color: var(--sage);
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(122, 139, 108, 0.08);
    }
    .option-btn:active {
      transform: scale(0.99);
      transition: transform 0.08s;
    }
    .option-btn.selected {
      border-color: var(--sage);
      background: var(--sage-tint);
    }
    .option-btn.selected .option-dot {
      border-color: var(--sage);
      background: var(--sage);
    }
    .option-dot { transition: border-color 0.2s ease, background 0.2s ease; }
    .option-dot svg {
      animation: checkPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes checkPop {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ============================================================
       BUTTONS — big, chunky, friendly
       Primary CTAs are oversized for easy tapping and a
       welcoming feel. Press animation is a gentle squish.
    ============================================================ */
    .btn {
      transition:
        background 0.2s ease,
        color 0.2s ease,
        transform 0.2s ease,
        box-shadow 0.25s ease;
      will-change: transform;
      font-weight: 600;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); }
    .btn:active:not(:disabled) {
      transform: scale(0.97);
      transition: transform 0.1s;
    }

    .btn-primary {
      background: var(--sage);
      color: #fff;
      box-shadow: 0 2px 8px rgba(122, 139, 108, 0.15);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--sage-hover);
      box-shadow: 0 8px 22px rgba(122, 139, 108, 0.22);
    }
    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      color: var(--ink);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--ink);
      background: var(--paper);
    }

    .btn-ghost {
      color: var(--ink-soft);
      transition: color 0.2s ease;
    }
    .btn-ghost:hover { color: var(--ink); }

    /* ============================================================
       PROGRESS BAR
    ============================================================ */
    .progress-fill {
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ============================================================
       ATMOSPHERE — gentle color blobs, very subtle grain
    ============================================================ */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      pointer-events: none;
      animation: breathe 16s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }
    .grain::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
      opacity: 0.03;
      mix-blend-mode: multiply;
    }

    /* ============================================================
       PAGE-LOAD STAGGER
    ============================================================ */
    .fade-up {
      opacity: 0;
      animation: fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .delay-1 { animation-delay: 0.08s; }
    .delay-2 { animation-delay: 0.18s; }
    .delay-3 { animation-delay: 0.30s; }
    .delay-4 { animation-delay: 0.42s; }
    .delay-5 { animation-delay: 0.54s; }

    /* ============================================================
       SPINNER — for the "pairing answers" moment
    ============================================================ */
    .spinner {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2.5px solid var(--border);
      border-top-color: var(--sage);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============================================================
       LITTLE THINGS
    ============================================================ */
    em.warm {
      font-style: italic;
      font-weight: 500;
      color: var(--sage-hover);
    }
  </style>
</head>

<body class="grain min-h-screen">
  <div id="app" class="relative">

    <!-- ============================================================
         SCREEN 1 — LANDING
    ============================================================ -->
    <section
      id="landing"
      class="screen min-h-screen flex-col items-center justify-center px-6 py-12 relative overflow-hidden"
    >
      <!-- Soft atmosphere blobs (butter + peach) -->
      <div class="blob" style="background: var(--butter); top: 6%; left: -14%; width: 460px; height: 460px; opacity: 0.35;"></div>
      <div class="blob" style="background: var(--peach); bottom: 6%; right: -14%; width: 480px; height: 480px; opacity: 0.3; animation-delay: -7s;"></div>

      <!-- Nav -->
      <nav class="absolute top-0 left-0 right-0 flex items-center justify-between px-6 md:px-12 py-6 z-10">
        <div class="text-xl md:text-2xl font-bold" style="color: var(--ink)">dr. Gracie</div>
        <div class="hidden md:flex gap-8 text-sm font-medium">
          <a href="#" class="btn-ghost">Shop</a>
          <a href="#" class="btn-ghost">How it works</a>
          <a href="#" class="btn-ghost">Help</a>
        </div>
      </nav>

      <!-- Hero -->
      <div class="relative z-10 w-full max-w-3xl text-center">
        <div class="fade-up delay-1 inline-flex items-center gap-2 px-4 py-2 rounded-full text-xs font-medium mb-7"
             style="background: var(--paper); color: var(--sage-hover); border: 1px solid var(--border)">
          <span class="w-1.5 h-1.5 rounded-full" style="background: var(--sage)"></span>
          Made for real, everyday smiles
        </div>

        <h1 class="fade-up delay-2 font-bold text-4xl sm:text-5xl md:text-6xl leading-[1.08] mb-6" style="color: var(--ink); letter-spacing: -0.02em">
          Let's find what works<br />
          for <em class="warm">your smile.</em>
        </h1>

        <p class="fade-up delay-3 text-base md:text-lg max-w-lg mx-auto mb-10 leading-relaxed" style="color: var(--ink-soft)">
          Six quick questions. One routine that actually fits.
          No pressure, no hard sell — we're here to help you figure it out.
        </p>

        <div class="fade-up delay-4 flex flex-col sm:flex-row gap-3 justify-center max-w-xl mx-auto">
          <button
            onclick="startQuiz()"
            class="btn btn-primary px-9 py-5 rounded-full text-base flex-1 inline-flex items-center justify-center gap-2"
          >
            <span>Let's do it</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M13 5l7 7-7 7" />
            </svg>
          </button>
          <button
            onclick="returningCustomer()"
            class="btn btn-secondary px-9 py-5 rounded-full text-base flex-1"
          >
            I've been here before
          </button>
        </div>

        <div class="fade-up delay-5 mt-10 text-sm flex flex-wrap items-center justify-center gap-x-6 gap-y-2" style="color: var(--ink-soft)">
          <span class="flex items-center gap-1.5">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            Dentist-made
          </span>
          <span class="flex items-center gap-1.5">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            Under a minute
          </span>
          <span class="flex items-center gap-1.5">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            30-day returns
          </span>
        </div>
      </div>
    </section>

    <!-- ============================================================
         SCREEN 2 — QUIZ
    ============================================================ -->
    <section
      id="quiz"
      class="screen min-h-screen flex-col items-center px-6 py-8 md:py-10 relative"
    >
      <!-- Header -->
      <div class="w-full max-w-2xl">
        <div class="flex items-center justify-between mb-4">
          <div class="text-lg font-bold" style="color: var(--ink)">dr. Gracie</div>
          <button onclick="goHome()" class="btn-ghost text-sm font-medium flex items-center gap-1.5">
            Close
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="h-[5px] w-full rounded-full overflow-hidden" style="background: var(--border)">
          <div id="progressBar" class="progress-fill h-full rounded-full" style="background: var(--sage); width: 0%"></div>
        </div>
        <div id="questionCounter" class="mt-3 text-xs font-medium" style="color: var(--ink-soft)">
          Step 1 of 6
        </div>
      </div>

      <!-- Question card (populated by JS) -->
      <div class="w-full max-w-2xl flex-1 flex items-center justify-center py-10">
        <div id="questionCard" class="question-card w-full"></div>
      </div>

      <!-- Footer nav -->
      <div class="w-full max-w-2xl flex items-center justify-between pb-4 gap-3">
        <button
          id="backBtn"
          onclick="prevQuestion()"
          class="btn-ghost text-sm font-medium flex items-center gap-2 opacity-0 pointer-events-none transition-opacity"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          Back
        </button>
        <button
          id="nextBtn"
          onclick="nextQuestion()"
          disabled
          class="btn btn-primary px-8 py-4 rounded-full text-base inline-flex items-center gap-2"
        >
          Next
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M13 5l7 7-7 7" />
          </svg>
        </button>
      </div>
    </section>

    <!-- ============================================================
         SCREEN 3 — RESULT (populated by JS)
    ============================================================ -->
    <section
      id="result"
      class="screen min-h-screen flex-col items-center justify-center px-6 py-16 relative overflow-hidden"
    ></section>
  </div>

  <script>
    /* ============================================================
       QUIZ DATA — friendlier wording, same scoring weights
    ============================================================ */
    const QUESTIONS = [
      {
        q: "What's one thing you'd love to change about your smile?",
        sub: "Pick whichever feels most like you.",
        options: [
          { label: "Brighten it up — it could be whiter",              scores: { brightness: 3, barrier: 0, gum: 0 } },
          { label: "Cut down on sensitivity when I eat or drink",      scores: { brightness: 0, barrier: 3, gum: 0 } },
          { label: "Calm down redness or puffiness at the gum line",   scores: { brightness: 0, barrier: 0, gum: 3 } },
          { label: "Honestly nothing major — just want to stay healthy", scores: { brightness: 1, barrier: 1, gum: 1 } },
        ],
      },
      {
        q: "Take a bite of cold ice cream. What happens?",
        sub: "",
        options: [
          { label: "Totally fine — bring on the second scoop",         scores: { brightness: 1, barrier: 0, gum: 0 } },
          { label: "A quick zing, then I'm good",                      scores: { brightness: 0, barrier: 1, gum: 0 } },
          { label: "Ouch — I mostly avoid cold things",                scores: { brightness: 0, barrier: 3, gum: 0 } },
          { label: "It's my gums that ache, not my teeth",             scores: { brightness: 0, barrier: 0, gum: 2 } },
        ],
      },
      {
        q: "When you floss, what do you usually see?",
        sub: "No judgment, promise.",
        options: [
          { label: "Clean floss — no blood",                           scores: { brightness: 1, barrier: 1, gum: 0 } },
          { label: "A little pink now and then",                       scores: { brightness: 0, barrier: 0, gum: 2 } },
          { label: "Often red, or the area feels sore",                scores: { brightness: 0, barrier: 0, gum: 3 } },
          { label: "I don't floss as often as I'd like to admit",      scores: { brightness: 0, barrier: 1, gum: 2 } },
        ],
      },
      {
        q: "Which drinks are in your daily rotation?",
        sub: "Pick the one that sounds closest to your usual.",
        options: [
          { label: "Coffee, tea, or matcha — a few times a day",       scores: { brightness: 3, barrier: 0, gum: 0 } },
          { label: "Red wine, cola, or dark juices pretty often",      scores: { brightness: 2, barrier: 1, gum: 0 } },
          { label: "Sparkling water, citrus, or kombucha daily",       scores: { brightness: 0, barrier: 3, gum: 0 } },
          { label: "Mostly just plain water",                          scores: { brightness: 1, barrier: 1, gum: 1 } },
        ],
      },
      {
        q: "Fast-forward three months. What would make you feel like your routine's working?",
        sub: "",
        options: [
          { label: "My teeth look visibly whiter in photos",           scores: { brightness: 3, barrier: 0, gum: 0 } },
          { label: "Cold drinks don't make me flinch anymore",         scores: { brightness: 0, barrier: 3, gum: 0 } },
          { label: "My gums stop bleeding and feel firm",              scores: { brightness: 0, barrier: 0, gum: 3 } },
          { label: "I just feel confident I'm doing things right",     scores: { brightness: 1, barrier: 1, gum: 1 } },
        ],
      },
      {
        q: "Last one — anything your dentist has mentioned lately?",
        sub: "",
        options: [
          { label: "Mentioned staining, or suggested whitening",       scores: { brightness: 3, barrier: 0, gum: 0 } },
          { label: "Flagged sensitivity or enamel wear",               scores: { brightness: 0, barrier: 3, gum: 0 } },
          { label: "Noted gum inflammation or early gingivitis",       scores: { brightness: 0, barrier: 0, gum: 3 } },
          { label: "Just regular cleanings — all good",                scores: { brightness: 1, barrier: 1, gum: 1 } },
        ],
      },
    ];

    /* ============================================================
       MATCH DATA
    ============================================================ */
    const MATCHES = {
      brightness: {
        name: "Brightness Match",
        short: "Brightness",
        tagline: "A gentle routine to help your smile look its brightest.",
        description: "Lifts everyday stains from coffee, tea, and wine — all while staying kind to your enamel. No zingy whitening burn.",
        includes: [
          "Daily Brightening Toothpaste",
          "Enamel-Safe Whitening Serum",
          "Soft-Bristle Polishing Brush",
          "Polish & Protect Mouthwash",
        ],
        price: "$64",
        accent: "butter",
        accentDeep: "butter-deep",
        icon: "sun",
      },
      barrier: {
        name: "Barrier Repair Match",
        short: "Barrier Repair",
        tagline: "Built for sensitive teeth that want some backup.",
        description: "Rebuilds enamel and quiets down nerve sensitivity — so hot coffee and cold smoothies can go back to feeling like nothing at all.",
        includes: [
          "Hydroxyapatite Remineralizing Paste",
          "Sensitivity-Shield Rinse",
          "Ultra-Soft Enamel Brush",
          "Overnight Barrier Treatment",
        ],
        price: "$68",
        accent: "sky",
        accentDeep: "sky-deep",
        icon: "shield",
      },
      gum: {
        name: "Gum Reset Match",
        short: "Gum Reset",
        tagline: "A soft reset for gums that need a little extra care.",
        description: "Calms inflammation, helps reduce bleeding, and brings your gums back to their healthiest, happiest baseline.",
        includes: [
          "Gum-Calming Toothpaste",
          "Herbal Anti-Inflammatory Rinse",
          "Gum-Massage Brush",
          "Daily Floss Ritual Kit",
        ],
        price: "$62",
        accent: "peach",
        accentDeep: "peach-deep",
        icon: "heart",
      },
    };

    /* ============================================================
       STATE
    ============================================================ */
    let currentQuestion = 0;
    let answers = [];

    /* ============================================================
       LOCAL STORAGE — graceful fallback
       Every storage call is wrapped in try/catch so the UI keeps
       working in private browsing, quota-exceeded, or restricted
       preview environments.
    ============================================================ */
    const STORAGE_KEY = 'drgracie-match-v1';

    function saveResult(winner, scores) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          winner,
          scores,
          completedAt: Date.now(),
        }));
      } catch (e) {
        // Storage unavailable — silently continue
      }
    }

    function loadResult() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        // Validate the stored winner still exists in MATCHES
        if (!parsed || !parsed.winner || !MATCHES[parsed.winner]) return null;
        return parsed;
      } catch (e) {
        return null;
      }
    }

    function clearResult() {
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    }

    /* ============================================================
       SCREEN TRANSITIONS — fade + slide orchestration
       Adds .leaving to the current screen, waits for the transition
       to complete, then hides it and fades in the next.
    ============================================================ */
    const TRANSITION_MS = 450;

    function showScreen(id) {
      const current = document.querySelector('.screen.active');
      const next = document.getElementById(id);

      if (!current) {
        // First screen — just fade in
        next.style.display = 'flex';
        requestAnimationFrame(() => next.classList.add('active'));
        return;
      }

      if (current === next) return;

      // Outgoing: slide up + fade out
      current.classList.add('leaving');
      current.classList.remove('active');

      setTimeout(() => {
        current.classList.remove('leaving');
        current.style.display = 'none';

        // Incoming: prepare, then fade + slide in
        next.style.display = 'flex';
        // Force reflow so transition plays
        void next.offsetHeight;
        requestAnimationFrame(() => {
          next.classList.add('active');
          window.scrollTo({ top: 0 });
        });
      }, TRANSITION_MS);
    }

    /* ============================================================
       FLOW CONTROL
    ============================================================ */
    function startQuiz() {
      currentQuestion = 0;
      answers = [];
      document.getElementById('nextBtn').style.display = '';
      document.getElementById('backBtn').style.display = '';
      showScreen('quiz');
      // Wait for screen-in transition, then render first question
      setTimeout(renderQuestion, TRANSITION_MS + 100);
    }

    function goHome() {
      if (confirm("Leave the quiz? Your answers won't be saved.")) {
        showScreen('landing');
      }
    }

    function returningCustomer() {
      // Wire this up to your actual login / account route
      alert("Welcome back! (This would route to your login page.)");
    }

    /* ============================================================
       QUIZ RENDERING
    ============================================================ */
    function renderQuestion() {
      const q = QUESTIONS[currentQuestion];
      const card = document.getElementById('questionCard');

      // Make sure footer buttons are showing (might be hidden from "calculating")
      document.getElementById('nextBtn').style.display = '';
      document.getElementById('backBtn').style.display = '';

      // Slide out the current content, swap, slide in
      const swap = () => {
        card.innerHTML = `
          <h2 class="font-bold text-3xl sm:text-4xl md:text-[2.75rem] leading-[1.15] mb-3 text-center max-w-2xl mx-auto" style="color: var(--ink); letter-spacing: -0.015em">
            ${q.q}
          </h2>
          ${
            q.sub
              ? `<p class="text-center mb-10 text-sm md:text-base" style="color: var(--ink-soft)">${q.sub}</p>`
              : `<div class="mb-10"></div>`
          }
          <div class="grid gap-3 max-w-xl mx-auto">
            ${q.options.map((opt, i) => `
              <button
                type="button"
                onclick="selectOption(${i})"
                class="option-btn px-5 py-5 rounded-2xl text-left text-base flex items-center justify-between gap-4 font-medium ${
                  answers[currentQuestion] === i ? 'selected' : ''
                }"
              >
                <span>${opt.label}</span>
                <span
                  class="option-dot w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0"
                  style="border-color: var(--border)"
                >
                  ${
                    answers[currentQuestion] === i
                      ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
                      : ''
                  }
                </span>
              </button>
            `).join('')}
          </div>
        `;

        // Progress
        const pct = ((currentQuestion + 1) / QUESTIONS.length) * 100;
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('questionCounter').textContent = `Step ${currentQuestion + 1} of ${QUESTIONS.length}`;

        // Back button visibility
        const backBtn = document.getElementById('backBtn');
        backBtn.classList.toggle('opacity-0', currentQuestion === 0);
        backBtn.classList.toggle('pointer-events-none', currentQuestion === 0);

        // Next button label + state
        const nextBtn = document.getElementById('nextBtn');
        nextBtn.disabled = answers[currentQuestion] === undefined;
        nextBtn.innerHTML = currentQuestion === QUESTIONS.length - 1
          ? `Show me my match <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>`
          : `Next <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>`;

        // Slide in
        card.classList.remove('leaving');
        void card.offsetHeight;
        card.classList.add('visible');
      };

      // If card has content, slide it out first; otherwise swap immediately
      if (card.classList.contains('visible')) {
        card.classList.remove('visible');
        card.classList.add('leaving');
        setTimeout(swap, 300);
      } else {
        swap();
      }
    }

    /**
     * Handle option selection. Updates state and in-place visual
     * feedback so the check animation plays.
     */
    function selectOption(index) {
      answers[currentQuestion] = index;
      document.querySelectorAll('.option-btn').forEach((btn, i) => {
        const isSelected = i === index;
        btn.classList.toggle('selected', isSelected);
        const dot = btn.querySelector('.option-dot');
        dot.innerHTML = isSelected
          ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
          : '';
      });
      document.getElementById('nextBtn').disabled = false;
    }

    function nextQuestion() {
      if (answers[currentQuestion] === undefined) return;
      if (currentQuestion === QUESTIONS.length - 1) {
        finishQuiz();
      } else {
        currentQuestion++;
        renderQuestion();
      }
    }

    function prevQuestion() {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
      }
    }

    /* ============================================================
       SCORING
       Sum weighted points across answers. Tiebreaker order is
       Gum > Barrier > Brightness (clinical urgency — gum disease
       is progressive, enamel loss is permanent, whitening is
       cosmetic).
    ============================================================ */
    function scoreQuiz() {
      const scores = { brightness: 0, barrier: 0, gum: 0 };

      answers.forEach((answerIndex, questionIndex) => {
        const s = QUESTIONS[questionIndex].options[answerIndex].scores;
        scores.brightness += s.brightness;
        scores.barrier   += s.barrier;
        scores.gum       += s.gum;
      });

      const max = Math.max(scores.brightness, scores.barrier, scores.gum);
      let winner;
      if (scores.gum === max) winner = 'gum';
      else if (scores.barrier === max) winner = 'barrier';
      else winner = 'brightness';

      return { winner, scores };
    }

    /* ============================================================
       RESULT FLOW
       1. Brief "pairing" micro-state (makes it feel considered)
       2. Compute winner + save to localStorage
       3. Build result DOM + crossfade to result screen
    ============================================================ */
    function finishQuiz() {
      const card = document.getElementById('questionCard');

      // Slide out current question, show calculating state
      card.classList.remove('visible');
      card.classList.add('leaving');

      setTimeout(() => {
        card.innerHTML = `
          <div class="text-center">
            <div class="spinner mx-auto mb-6"></div>
            <p class="text-2xl md:text-3xl font-bold" style="color: var(--ink); letter-spacing: -0.01em">
              One sec — pairing your answers.
            </p>
            <p class="mt-2 text-sm md:text-base" style="color: var(--ink-soft)">
              Matching you with the routine that fits best.
            </p>
          </div>
        `;
        card.classList.remove('leaving');
        void card.offsetHeight;
        card.classList.add('visible');

        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('progressBar').style.width = '100%';
      }, 300);

      const { winner, scores } = scoreQuiz();
      saveResult(winner, scores);
      renderResult(winner, { returning: false });

      setTimeout(() => showScreen('result'), 1800);
    }

    /**
     * Build the result screen. The `returning` flag switches the
     * top eyebrow + headline to welcome someone back rather than
     * congratulating them on finishing.
     */
    function renderResult(winner, { returning = false } = {}) {
      const m = MATCHES[winner];

      const ICONS = {
        sun:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
        shield: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7"><path d="M12 2L4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6l-8-4z"/></svg>',
        heart:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
      };

      const eyebrow = returning ? 'Welcome back' : 'Here you go';
      const headline = returning
        ? `Your routine is <em class="warm">ready.</em>`
        : `We'd start you with the <em class="warm">${m.short}</em> Match.`;
      const subhead = returning
        ? "Here's the routine we matched you with last time. Ready when you are."
        : m.tagline;

      document.getElementById('result').innerHTML = `
        <!-- Soft accent blobs tinted to the Match -->
        <div class="blob" style="background: var(--${m.accent}); top: -8%; right: -15%; width: 500px; height: 500px; opacity: 0.5;"></div>
        <div class="blob" style="background: var(--${m.accent}); bottom: -15%; left: -15%; width: 440px; height: 440px; opacity: 0.3; animation-delay: -5s;"></div>

        <div class="relative z-10 w-full max-w-xl text-center">
          <div class="fade-up delay-1 inline-flex items-center gap-2 px-4 py-2 rounded-full text-xs font-medium mb-6"
               style="background: var(--paper); color: var(--sage-hover); border: 1px solid var(--border)">
            <span class="w-1.5 h-1.5 rounded-full" style="background: var(--sage)"></span>
            ${eyebrow}
          </div>

          <h2 class="fade-up delay-2 font-bold text-4xl sm:text-5xl md:text-[3.5rem] leading-[1.08] mb-4" style="color: var(--ink); letter-spacing: -0.02em">
            ${headline}
          </h2>

          <p class="fade-up delay-3 text-base md:text-lg max-w-md mx-auto mb-10 leading-relaxed" style="color: var(--ink-soft)">
            ${subhead}
          </p>

          <!-- Routine card -->
          <div
            class="fade-up delay-4 rounded-3xl p-7 md:p-9 text-left"
            style="background: var(--paper); border: 1px solid var(--border); box-shadow: 0 2px 24px rgba(58, 53, 45, 0.05)"
          >
            <div class="flex items-start gap-5 mb-6">
              <div
                class="w-14 h-14 rounded-2xl flex items-center justify-center flex-shrink-0"
                style="background: var(--${m.accent}); color: var(--${m.accentDeep})"
              >
                ${ICONS[m.icon]}
              </div>
              <div>
                <div class="text-xl md:text-2xl font-bold mb-1.5" style="color: var(--ink)">
                  ${m.name}
                </div>
                <p class="text-sm md:text-base leading-relaxed" style="color: var(--ink-soft)">
                  ${m.description}
                </p>
              </div>
            </div>

            <div class="pt-5" style="border-top: 1px solid var(--border)">
              <div class="text-xs font-semibold mb-3 uppercase tracking-wider" style="color: var(--ink-soft)">
                What's in the box
              </div>
              <ul class="space-y-2.5">
                ${m.includes.map(item => `
                  <li class="flex items-center gap-3 text-sm md:text-base" style="color: var(--ink)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--${m.accentDeep})" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    <span>${item}</span>
                  </li>
                `).join('')}
              </ul>
            </div>
          </div>

          <!-- Actions -->
          <div class="fade-up delay-5 mt-8 flex flex-col sm:flex-row gap-3 justify-center">
            <button onclick="alert('Would route to the routine product page.')" class="btn btn-primary px-9 py-5 rounded-full text-base">
              Try this routine · ${m.price}
            </button>
            <button onclick="retakeQuiz()" class="btn btn-secondary px-9 py-5 rounded-full text-base">
              Take the quiz again
            </button>
          </div>

          <p class="fade-up delay-5 mt-6 text-sm" style="color: var(--ink-soft)">
            Free shipping over $50 · Cancel or swap anytime · Real humans to help
          </p>
        </div>
      `;
    }

    /**
     * Clear any saved result and start the quiz fresh.
     * Used by the "Take the quiz again" button on the result screen.
     */
    function retakeQuiz() {
      clearResult();
      startQuiz();
    }

    /* ============================================================
       INIT — on page load, check for a saved result. If we have
       one, skip straight to the result screen (returning mode).
       Otherwise, show the landing page.
    ============================================================ */
    document.addEventListener('DOMContentLoaded', () => {
      const saved = loadResult();
      if (saved) {
        renderResult(saved.winner, { returning: true });
        document.getElementById('result').style.display = 'flex';
        requestAnimationFrame(() => {
          document.getElementById('result').classList.add('active');
        });
      } else {
        document.getElementById('landing').style.display = 'flex';
        requestAnimationFrame(() => {
          document.getElementById('landing').classList.add('active');
        });
      }
    });
  </script>
</body>
</html>
